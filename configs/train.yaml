required_conda_env: null

run:
  out_dir: "outputs"
  run_name: "fastvit_t8_both"
  overwrite: true

device:
  device: "cuda:0"
  seed: 42
  amp: true

data:
  dataset_source: "both"
  catheter_root: "datasets/real_dataset"
  real_val_scene_names:
    - "scene_left_035"
    - "scene_right_036"
    - "scene_left_045"
    - "scene_right_046"
    - "scene_mono_027"
    - "scene_mono_028"
    - "scene_mono_029"

  synthetic_root: "datasets/synthetic_dataset"
  # e0 is always synthetic validation. Synthetic training cycles through e1, e2, ...
  synthetic_val_folder: "e1" # "e0"
  synthetic_train_start_epoch: 1
  synthetic_mask_subdir: "masks"
  # Used only when dataset_source == "both": combine validation as
  # val_mIoU = val_real_weight * real_val_mIoU + (1 - val_real_weight) * synthetic_val_mIoU.
  val_real_weight: 0.50
  # Used only when dataset_source == "both": rotate through this fraction of
  # real TRAIN frames each epoch. With 0.10, every real train frame is seen
  # once after 10 epochs.
  catheter_fraction_when_both: 0.10
  catheter_fraction_seed: 42
  test_root: "datasets/external_test_catheter"
  test_mask_subdir: "masks"
  best_scene_name: "val_miou"
  crop_sizes: [[512, 512], [384, 640]]
  img_pad_value: 0
  mask_pad_value: 0
  share_photo_params_lr: true
  photo_aug:
    blur_p: 0.30
    blur_radius_range: [0.1, 1.6]
    catheter_motion_blur_p: 0.25
    catheter_motion_blur_kernel_range: [7, 15]
    catheter_motion_blur_angle_range: [0, 180]
    catheter_specular_p: 0.20
    catheter_specular_count_range: [1, 3]
    catheter_specular_radius_frac_range: [0.01, 0.05]
    catheter_specular_strength_range: [0.20, 0.55]
    exposure_p: 0.35
    exposure_ev_range: [-0.7, 0.7]
    jitter_p: 0.90
    brightness_range: [0.75, 1.25]
    contrast_range: [0.70, 1.30]
    saturation_range: [0.70, 1.30]
    hue_range: [-0.08, 0.08]

loader:
  batch_size: 4
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  drop_last_train: true

model:
  # Paper checkpoint variants:
  # fastvit_t8, fastvit_sa12, fastvit_sa36, convnext_tiny, mobilenetv3_large_100
  variant: "fastvit_t8"
  num_classes: 2
  fpn_dim: 256
  backbone_init: true
  backbone_init_dir: "third_party/fvit/unfused_checkpoints" # for fastvit models 

train:
  epochs: 20
  lr: 1.0e-4
  weight_decay: 1.0e-4
  backbone_lr_scale: 0.1

scheduler:
  name: "poly"
  power: 0.9
  min_lr: 0.0
  warmup_steps: 10

eval:
  enabled: true
  interval_epochs: 1
  always_eval_final_epoch: true
  compute_val_loss: false
  compute_line_prior: false

loss:
  name: "ce_dice"
  ignore_index: 255
  background_index: 0
  eval_include_background: false
  line_prior:
    enabled: true
    weight: 0.02
    foreground_index: 1
    std_weight: 0.50

resume:
  enabled: false
  from_dir: null
