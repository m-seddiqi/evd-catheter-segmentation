project_root: .

dataset:
  config_path: configs/train.yaml
  test_root: datasets/external_test_catheter
  mask_subdir: masks
  scene_id: scene_yt1_001
  num_samples: 1000
  # Height/width after the same evaluation preprocessing used for PyTorch testing.
  # This must match qai.input_shape_nchw below: [batch, channels, height, width].
  input_hw: [384, 640]
  dataset_name: evd_catheter_scene_yt1_001_h384_w640_n1000_int8_npu_nchw
  upload: true

qai:
  device_name: Samsung Galaxy S23
  channel_first: true
  # Static export shape. For NCHW this is [N, C, H, W]; keep H/W aligned with dataset.input_hw.
  input_shape_nchw: [1, 3, 384, 640]
  active_compile_profile: int8_npu
  compile_profiles:
    int8_npu:
      output_prefix: int8_npu
      compile_options: --target_runtime tflite --compute_unit npu
      do_compile: true
      do_profile: false
      # If true, QAI Hub runs the uploaded dataset and this repo saves prediction masks.
      # If false, the script only exports the compiled TFLite model.
      do_inference: true
      quantization:
        enabled: true
        precompile_options: --target_runtime onnx
        weights_dtype: int8
        activations_dtype: int8
        quant_options: --lite_mp percentage=10;override_qtype=fp16 --range_scheme mse_minimizer

model_sources:
  - source_dir: outputs
    # Empty means scan all outputs/<run_name> folders. Use --models or fill this list to limit jobs.
    select_models: []  # empty => all outputs/<run_name> folders with config + best_model.pth

paths:
  dataset_manifest_path: export/output_models_int8_npu/generated/datasets/qai_manifest_scene_yt1_001_nchw.json
  dataset_id_path: export/output_models_int8_npu/generated/datasets/qai_dataset_id_scene_yt1_001_nchw.txt
  outputs_root: export/output_models_int8_npu/generated/inference
  run_registry_path: export/output_models_int8_npu/generated/inference/qai_compile_infer_registry.json
  metrics_json_path: export/output_models_int8_npu/generated/metrics/qai_metrics_all_inferences.json

metrics:
  surface_stride: 2
  nsd_tolerance_px: 2.0
